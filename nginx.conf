worker_processes auto;
events { worker_connections 1024; }

http {
    include mime.types;
    server {
        listen 80;

        location / {
            proxy_pass https://www.ddizi.im;
            proxy_ssl_server_name on;
            proxy_ssl_name www.ddizi.im;
            proxy_ssl_verify off;
            
            proxy_set_header Host www.ddizi.im;
            proxy_set_header Referer https://www.ddizi.im;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            proxy_set_header Accept-Encoding "";
            proxy_buffering off;
            
            # KRİTİK: Player engellerini aşmak için CORS başlıklarını zorla ekliyoruz
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            
            # Tüm linkleri onarıyoruz
            sub_filter 'https://www.ddizi.im' 'https://x3nc1-proxy.onrender.com';
            sub_filter 'https://vidmoly.to' 'https://x3nc1-proxy.onrender.com';
            sub_filter 'https://fembed.com' 'https://x3nc1-proxy.onrender.com';
            sub_filter_once off;
            sub_filter_types *;
        }
    }
}
