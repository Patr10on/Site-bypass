worker_processes auto;
events { worker_connections 1024; }

http {
    include mime.types;
    
    server {
        listen 80;

        location / {
            # Hedef siteyi tam yetkiyle bağla
            proxy_pass https://www.ddizi.im;
            
            # SSL ve Bağlantı Ayarları (Hız için optimize edildi)
            proxy_ssl_server_name on;
            proxy_ssl_name www.ddizi.im;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            
            # Player Engellerini Kırmak İçin Zorunlu Headerlar
            proxy_set_header Host www.ddizi.im;
            proxy_set_header Referer https://www.ddizi.im;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            # Gecikmeyi Önle (Video akışı için kritik)
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header Accept-Encoding "";

            # CORS Ayarları (Player "erişim engellendi" demesin diye)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;

            # Linkleri Onar
            sub_filter 'https://www.ddizi.im' 'https://x3nc1-proxy.onrender.com';
            sub_filter 'www.ddizi.im' 'x3nc1-proxy.onrender.com';
            sub_filter_once off;
            sub_filter_types *;
        }
    }
}
