worker_processes auto;
events { worker_connections 2048; }

http {
    include mime.types;
    sendfile on;

    server {
        listen 80;

        location / {
            # 1. HEDEF SİTE VE SSL AYARLARI
            proxy_pass https://www.ddizi.im;
            proxy_ssl_server_name on;
            proxy_ssl_name www.ddizi.im;
            proxy_ssl_verify off;
            
            # 2. TARAYICIYI VE OKUL AĞINI KANDIRAN HEADERLAR
            proxy_set_header Host www.ddizi.im;
            proxy_set_header Referer https://www.ddizi.im;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            # 3. TÜM GÜVENLİK KİLİTLERİNİ KIR (Kritik Nokta)
            proxy_hide_header 'Content-Security-Policy';
            proxy_hide_header 'X-Frame-Options';
            proxy_hide_header 'X-Content-Type-Options';
            proxy_ignore_headers "Set-Cookie"; # Cookie çakışmasını önle
            
            # 4. VİDEO AKIŞINI SERBEST BIRAK
            proxy_buffering off;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;

            # 5. GLOBAL ERİŞİM İZNİ (CORS FIX)
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Allow-Credentials true always;

            # 6. AGRESİF LİNK ONARMA
            sub_filter_once off;
            sub_filter_types *;
            sub_filter 'https://www.ddizi.im' 'https://x3nc1-proxy.onrender.com';
            sub_filter 'www.ddizi.im' 'x3nc1-proxy.onrender.com';
            sub_filter 'https://' 'https://'; # Mixed content hatasını önle
        }
    }
}
