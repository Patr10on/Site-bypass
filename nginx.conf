worker_processes auto;
events { worker_connections 1024; }

http {
    include mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    server {
        listen 80;

        location / {
            # Hedef Site
            proxy_pass https://www.ddizi.im;
            
            # SNI & SSL Bypass (502 Fix)
            proxy_ssl_server_name on;
            proxy_ssl_name www.ddizi.im;
            proxy_ssl_verify off;
            
            # Kimlik & Header Manipülasyonu
            proxy_set_header Host www.ddizi.im;
            proxy_set_header Referer https://www.ddizi.im;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            # Video Streaming Optimizasyonu
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;

            # CORS & Güvenlik Duvarı Kırıcılar
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            
            # --- AGRESİF TÜNELLEME (Linkleri X3NC1 Üzerine Çek) ---
            sub_filter_once off;
            sub_filter_types *;
            sub_filter 'https://www.ddizi.im' 'https://x3nc1-proxy.onrender.com';
            sub_filter 'www.ddizi.im' 'x3nc1-proxy.onrender.com';
            sub_filter 'vidmoly.to' 'x3nc1-proxy.onrender.com';
            sub_filter 'moly.to' 'x3nc1-proxy.onrender.com';
            sub_filter 'fembed.com' 'x3nc1-proxy.onrender.com';
            sub_filter 'https://' 'https://'; # SSL zorlaması
        }
    }
}
